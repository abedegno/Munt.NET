name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  MUNT_DIR: munt-src

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            cmake_lib: libmt32emu.so
            native_lib: libmt32emu.so
          - os: windows-latest
            rid: win-x64
            cmake_lib: mt32emu.dll
            native_lib: libmt32emu.dll
          - os: macos-latest
            rid: osx-arm64
            cmake_lib: libmt32emu.dylib
            native_lib: libmt32emu.dylib
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Clone munt
        run: git clone --depth 1 https://github.com/munt/munt.git ${{ env.MUNT_DIR }}

      - name: Build mt32emu native library
        run: |
          cd ${{ env.MUNT_DIR }}/mt32emu
          cmake -B build -DCMAKE_BUILD_TYPE=Release -Dlibmt32emu_SHARED=ON
          cmake --build build --config Release

      - name: Copy native library (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p src/Munt.NET/runtimes/${{ matrix.rid }}/native
          find ${{ env.MUNT_DIR }}/mt32emu/build -name "${{ matrix.cmake_lib }}" -exec cp {} src/Munt.NET/runtimes/${{ matrix.rid }}/native/${{ matrix.native_lib }} \;

      - name: Copy native library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src/Munt.NET/runtimes/${{ matrix.rid }}/native"
          $lib = Get-ChildItem -Path "${{ env.MUNT_DIR }}/mt32emu/build" -Recurse -Filter "${{ matrix.cmake_lib }}" | Select-Object -First 1
          if ($null -eq $lib) { Write-Error "Native library ${{ matrix.cmake_lib }} not found"; exit 1 }
          Write-Host "Found: $($lib.FullName)"
          Copy-Item $lib.FullName -Destination "src/Munt.NET/runtimes/${{ matrix.rid }}/native/${{ matrix.native_lib }}"

      - name: Build
        run: dotnet build Munt.NET.sln --configuration Release

      - name: Test
        run: dotnet test Munt.NET.sln --configuration Release
